[project]
name = "yoyopy"
version = "0.1.0"
description = "YoyoPod integrated VoIP and local-first mpv player for Raspberry Pi"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "YoyoPod Team" }
]
keywords = ["yoyopod", "yoyopy", "raspberry-pi", "voip", "mpv", "audio-player", "local-first"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "cffi>=1.17.0",
    "pillow>=10.0.0",
    "pygame>=2.5.0",
    "requests>=2.31.0",
    "loguru>=0.7.0",
    "gpiod<2; platform_system == 'Linux'",
    "displayhatmini>=0.0.1; platform_system == 'Linux'",
    "pyyaml>=6.0.3",
    "vosk>=0.3.45",
    "flask>=3.0.0",
    "flask-socketio>=5.3.0",
    "flask-cors>=4.0.0",
    "python-socketio>=5.11.0",
    "pynput>=1.7.0",
    "tinytag>=2.2.1",
    "pyserial>=3.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "black>=24.0.0",
    "ruff>=0.3.0",
    "mypy>=1.8.0",
    "types-PyYAML",
    "typer>=0.12.0",
]

[project.scripts]
yoyopy = "yoyopy.main:main"
yoyopod = "yoyopy.main:main"
yoyoctl = "yoyopy.cli:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["yoyopy"]

[tool.black]
line-length = 100
target-version = ['py312']

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.yoyopod_quality]
gate_format_paths = [
    "scripts/quality.py",
    "yoyopy/main.py",
    "yoyopy/cli/__init__.py",
    "yoyopy/cli/common.py",
    "yoyopy/cli/build.py",
    "yoyopy/cli/remote",
]
gate_lint_paths = [
    "scripts/quality.py",
    "yoyopy/main.py",
    "yoyopy/cli/__init__.py",
    "yoyopy/cli/common.py",
    "yoyopy/cli/build.py",
    "yoyopy/cli/remote",
]
gate_type_paths = [
    "scripts/quality.py",
    "yoyopy/main.py",
    "yoyopy/cli/__init__.py",
    "yoyopy/cli/common.py",
    "yoyopy/cli/build.py",
    "yoyopy/cli/remote",
]
audit_format_paths = ["."]
audit_lint_paths = ["."]
audit_type_paths = ["yoyopy"]
