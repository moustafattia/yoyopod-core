name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and publish, for example v0.2.0
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run staged quality gate
        run: uv run python scripts/quality.py gate

      - name: Run tests
        run: uv run pytest -q

      - name: Build release artifacts
        run: uv run yoyopod release build --check-tag "$RELEASE_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 slot artifact
        run: |
          SLOT_VERSION="${RELEASE_TAG#v}"
          ./scripts/build_slot_artifact_ci.sh \
            --channel=stable \
            --version="${SLOT_VERSION}" \
            --dest=dist \
            --cache-from=type=gha,scope=yoyopod-slot-arm64 \
            --cache-to=type=gha,mode=max,scope=yoyopod-slot-arm64,ignore-error=true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-release-${{ env.RELEASE_TAG }}
          path: dist/**/*
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "YoYoPod $RELEASE_TAG" --generate-notes
          fi
