name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      slot_arm64: ${{ steps.filter.outputs.slot_arm64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect slot artifact inputs
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${PR_BASE_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && ! [[ "${PUSH_BEFORE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
          else
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null || \
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"

          git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(\.github/workflows/(ci|release)\.yml|\.python-version|pyproject\.toml|yoyopod\.py|config/|deploy/docker/slot-builder\.Dockerfile|deploy/scripts/(install_release|launch)\.sh|scripts/(build_release\.py|build_slot_artifact_ci\.sh)|workers/voice/go/|src/|yoyopod/|yoyopod_cli/)' changed-files.txt; then
            echo "slot_arm64=true" >> "${GITHUB_OUTPUT}"
          else
            echo "slot_arm64=false" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run staged quality gate
        run: uv run python scripts/quality.py gate

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

  voice-go:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: workers/voice/go/go.mod
          cache-dependency-path: workers/voice/go/go.mod

      - name: Run Go voice worker tests
        working-directory: workers/voice/go
        run: go test ./...

  ui-rust:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust UI host tests
        working-directory: src
        run: cargo test --workspace --locked --features whisplay-hardware

      - name: Build Rust UI Whisplay host
        working-directory: src
        run: |
          set -euo pipefail
          cargo build --release -p yoyopod-ui-host --features whisplay-hardware --locked
          mkdir -p crates/ui-host/build
          cp target/release/yoyopod-ui-host crates/ui-host/build/yoyopod-ui-host

      - name: Upload Rust UI ARM64 host
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-ui-host-${{ github.sha }}
          path: src/crates/ui-host/build/yoyopod-ui-host
          if-no-files-found: error

  slot-arm64:
    runs-on: ubuntu-latest
    needs: [changes, quality, test, voice-go, ui-rust]
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          needs.changes.outputs.slot_arm64 == 'true' &&
          (
            github.event_name == 'push' ||
            (
              github.event_name == 'pull_request' &&
              contains(github.event.pull_request.labels.*.name, 'build-arm-slot')
            )
          )
        )
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 slot artifact
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          ./scripts/build_slot_artifact_ci.sh \
            --channel=dev \
            --version="${VERSION}" \
            --dest=dist \
            --cache-from=type=gha,scope=yoyopod-slot-arm64 \
            --cache-to=type=gha,mode=max,scope=yoyopod-slot-arm64,ignore-error=true

      - name: Upload ARM64 slot artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-slot-arm64-${{ github.sha }}
          path: dist/yoyopod-slot-*.tar.gz*
          if-no-files-found: error
