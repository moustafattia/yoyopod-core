name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      slot_arm64: ${{ steps.filter.outputs.slot_arm64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect slot artifact inputs
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${PR_BASE_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && ! [[ "${PUSH_BEFORE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
          else
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null || \
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"

          git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(\.github/workflows/(ci|release)\.yml|\.python-version|pyproject\.toml|yoyopod\.py|config/|deploy/docker/slot-builder\.Dockerfile|deploy/scripts/(install_release|launch)\.sh|scripts/(build_release\.py|build_slot_artifact_ci\.sh)|src/|yoyopod/|yoyopod_cli/|yoyopod_rs/)' changed-files.txt; then
            echo "slot_arm64=true" >> "${GITHUB_OUTPUT}"
          else
            echo "slot_arm64=false" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run staged quality gate
        run: uv run python scripts/quality.py gate

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

  rust-device-arm64:
    runs-on: ubuntu-24.04-arm
    env:
      RUST_ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      YOYOPOD_LVGL_SOURCE_DIR: ${{ github.workspace }}/.cache/lvgl/lvgl-9.5.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Fetch pinned LVGL source
        run: |
          git clone --depth 1 --branch v9.5.0 https://github.com/lvgl/lvgl.git .cache/lvgl/lvgl-9.5.0

      - name: Install native Rust host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config liblinphone-dev libudev-dev

      - name: Run Bazel Rust host tests
        run: bazel test --action_env=PATH //yoyopod_rs/ui/... //yoyopod_rs/cloud/... //yoyopod_rs/media/... //yoyopod_rs/voip/... //yoyopod_rs/network/... //yoyopod_rs/power/... //yoyopod_rs/speech/... //yoyopod_rs/runtime/...

      - name: Run Rust workspace tests
        working-directory: yoyopod_rs
        run: cargo test --workspace --locked --features whisplay-hardware,native-lvgl

      - name: Build Rust device ARM64 bundle
        working-directory: yoyopod_rs
        run: |
          set -euo pipefail
          cargo build --release --locked \
            -p yoyopod-runtime \
            -p yoyopod-ui \
            -p yoyopod-cloud \
            -p yoyopod-media \
            -p yoyopod-voip \
            -p yoyopod-network \
            -p yoyopod-power \
            -p yoyopod-speech \
            --features yoyopod-ui/whisplay-hardware,yoyopod-ui/native-lvgl,yoyopod-voip/native-liblinphone

          bundle_name="yoyopod-rust-device-arm64-${RUST_ARTIFACT_SHA}"
          bundle_root="target/${bundle_name}"
          rm -rf "${bundle_root}" "target/${bundle_name}.tar.gz"
          mkdir -p \
            "${bundle_root}/yoyopod_rs/runtime/build" \
            "${bundle_root}/yoyopod_rs/ui/build" \
            "${bundle_root}/yoyopod_rs/cloud/build" \
            "${bundle_root}/yoyopod_rs/media/build" \
            "${bundle_root}/yoyopod_rs/voip/build" \
            "${bundle_root}/yoyopod_rs/network/build" \
            "${bundle_root}/yoyopod_rs/power/build" \
            "${bundle_root}/yoyopod_rs/speech/build"
          cp target/release/yoyopod-runtime "${bundle_root}/yoyopod_rs/runtime/build/yoyopod-runtime"
          cp target/release/yoyopod-ui-host "${bundle_root}/yoyopod_rs/ui/build/yoyopod-ui-host"
          cp target/release/yoyopod-cloud-host "${bundle_root}/yoyopod_rs/cloud/build/yoyopod-cloud-host"
          cp target/release/yoyopod-media-host "${bundle_root}/yoyopod_rs/media/build/yoyopod-media-host"
          cp target/release/yoyopod-voip-host "${bundle_root}/yoyopod_rs/voip/build/yoyopod-voip-host"
          cp target/release/yoyopod-network-host "${bundle_root}/yoyopod_rs/network/build/yoyopod-network-host"
          cp target/release/yoyopod-power-host "${bundle_root}/yoyopod_rs/power/build/yoyopod-power-host"
          cp target/release/yoyopod-speech-host "${bundle_root}/yoyopod_rs/speech/build/yoyopod-speech-host"
          tar -C "${bundle_root}" -czf "target/${bundle_name}.tar.gz" yoyopod_rs

      - name: Upload Rust device ARM64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-rust-device-arm64-${{ env.RUST_ARTIFACT_SHA }}
          path: yoyopod_rs/target/yoyopod-rust-device-arm64-${{ env.RUST_ARTIFACT_SHA }}.tar.gz
          if-no-files-found: error

  slot-arm64:
    runs-on: ubuntu-latest
    needs: [changes, quality, test, rust-device-arm64]
    env:
      RUST_ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          needs.changes.outputs.slot_arm64 == 'true' &&
          (
            github.event_name == 'push' ||
            (
              github.event_name == 'pull_request' &&
              contains(github.event.pull_request.labels.*.name, 'build-arm-slot')
            )
          )
        )
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Rust device ARM64 bundle
        uses: actions/download-artifact@v4
        with:
          name: yoyopod-rust-device-arm64-${{ env.RUST_ARTIFACT_SHA }}
          path: .artifacts/rust-device

      - name: Extract Rust device ARM64 bundle
        run: |
          set -euo pipefail
          tar -xzf ".artifacts/rust-device/yoyopod-rust-device-arm64-${RUST_ARTIFACT_SHA}.tar.gz" -C .

      - name: Build ARM64 slot artifact
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          ./scripts/build_slot_artifact_ci.sh \
            --channel=dev \
            --version="${VERSION}" \
            --dest=dist \
            --cache-from=type=gha,scope=yoyopod-slot-arm64 \
            --cache-to=type=gha,mode=max,scope=yoyopod-slot-arm64,ignore-error=true

      - name: Upload ARM64 slot artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoyopod-slot-arm64-${{ github.sha }}
          path: dist/yoyopod-slot-*.tar.gz*
          if-no-files-found: error
