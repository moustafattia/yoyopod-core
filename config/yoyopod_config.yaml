# YoyoPod Unified Configuration
# Phase 5: VoIP + Music Integration
# Known board configs live under `config/boards/<board>/yoyopod_config.yaml`.
# `YOYOPOD_CONFIG_BOARD` can force a board, and known hardware such as
# Raspberry Pi Zero 2W and Radxa Cubie A7Z is auto-detected.

app:
  name: "YoyoPod"
  version: "1.0.0"
  simulate: false

# Audio / Music Settings
audio:
  music_dir: "/home/tifo/Music"
  mpv_socket: "/tmp/yoyopod-mpv.sock"
  mpv_binary: "mpv"
  alsa_device: "default"
  auto_resume_after_call: true    # Resume music after call ends
  fade_out_duration_ms: 0         # Fade out before call (0 = instant)
  fade_in_duration_ms: 0          # Fade in after call (0 = instant)
  default_volume: 100             # 0-100

# VoIP Settings (reference to voip_config.yaml)
voip:
  config_file: "config/voip_config.yaml"
  priority_over_music: true       # Always pause music for calls
  auto_answer: false              # Auto-answer incoming calls
  ring_duration_seconds: 30       # Max ring time before auto-reject

# UI Settings
ui:
  theme: "dark"                   # dark, light
  show_album_art: true            # Show album art if available
  screen_timeout_seconds: 300     # Dim screen after 5 minutes
  button_debounce_ms: 50          # Button debounce time

# Input Settings
input:
  ptt_navigation: true            # true = Whisplay navigation; false = experimental raw PTT mode for future voice features
  whisplay_debounce_ms: 50        # Debounce for the hardware button
  whisplay_double_tap_ms: 300     # Max gap between taps for confirm
  whisplay_long_hold_ms: 800      # Hold time for back/cancel

# Voice Settings
voice:
  commands_enabled: true          # Enable local voice-command flow
  ai_requests_enabled: true       # Show placeholder AI request flow until backend lands
  screen_read_enabled: false      # Auto-read screens when supported
  stt_enabled: true               # Enable local speech-to-text
  tts_enabled: true               # Enable spoken responses
  stt_backend: "vosk"
  tts_backend: "espeak-ng"
  vosk_model_path: "models/vosk-model-small-en-us"
  record_seconds: 4
  sample_rate_hz: 16000
  tts_rate_wpm: 155
  tts_voice: "en"

# Power Settings
power:
  enabled: true
  backend: "pisugar"              # Current power backend implementation
  transport: "auto"               # auto, socket, tcp
  socket_path: "/tmp/pisugar-server.sock"
  tcp_host: "127.0.0.1"
  tcp_port: 8423
  timeout_seconds: 2.0
  poll_interval_seconds: 30.0
  low_battery_warning_percent: 20.0
  low_battery_warning_cooldown_seconds: 300.0
  auto_shutdown_enabled: true
  critical_shutdown_percent: 10.0
  shutdown_delay_seconds: 15.0    # Grace period before poweroff to save state
  shutdown_command: "sudo -n shutdown -h now"
  shutdown_state_file: "data/last_shutdown_state.json"
  watchdog_enabled: false         # Enable PiSugar software watchdog for app-loop heartbeat
  watchdog_timeout_seconds: 60    # PiSugar timeout register uses 2-second units
  watchdog_feed_interval_seconds: 15.0
  watchdog_i2c_bus: 1
  watchdog_i2c_address: 0x57
  watchdog_command_timeout_seconds: 5.0

# Display Settings
display:
  hardware: "auto"                # auto, whisplay, pimoroni, simulation (Whisplay-like preview)
  whisplay_renderer: "lvgl"       # pil, lvgl (Whisplay defaults to LVGL; PIL remains for fallback/debug)
  lvgl_buffer_lines: 40           # Partial flush buffer height in lines for Whisplay LVGL
  brightness: 80                  # 0-100
  rotation: 0                     # 0, 90, 180, 270
  backlight_timeout_seconds: 60   # Turn off backlight after 1 min

# Logging
logging:
  level: "INFO"                   # DEBUG, INFO, WARNING, ERROR
  file: "logs/yoyopod.log"
  error_file: "logs/yoyopod_errors.log"
  pid_file: "/tmp/yoyopod.pid"
  rotation: "5 MB"
  retention: "3 days"
  compression: "gz"
  error_rotation: "2 MB"
  error_retention: "7 days"
  encoding: "utf-8"
  enqueue: false                  # Write immediately for near-real-time tails
  backtrace: true
  diagnose: true

# Investigation-only diagnostics
diagnostics:
  responsiveness_watchdog_enabled: false              # Opt-in loop-stall evidence capture for Pi investigations
  responsiveness_watchdog_poll_interval_seconds: 1.0  # Background watchdog cadence
  responsiveness_stall_threshold_seconds: 5.0         # Emit evidence when the app loop stops advancing this long
  responsiveness_capture_cooldown_seconds: 30.0      # Do not recapture repeatedly while a single stall persists
  responsiveness_recent_input_window_seconds: 3.0    # Treat very recent input as evidence the input side is still alive
  responsiveness_capture_dir: "logs/responsiveness"  # JSON + traceback artifacts for automatic captures

# 4G Cellular Network Settings
network:
  enabled: false
  serial_port: /dev/ttyUSB2
  ppp_port: /dev/ttyUSB3
  baud_rate: 115200
  apn: ""
  gps_enabled: true
