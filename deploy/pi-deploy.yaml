# Raspberry Pi deploy contract for YoYoPod.
# This is the shared source of truth for `yoyopod remote` and the Pi skills.
# The board should reuse one stable checkout path at `project_dir`.
# Machine-specific connection overrides belong in deploy/pi-deploy.local.yaml.
# Leave host/user blank in the tracked file; do not commit personal Pi values here.
# Create or edit that file with:
#   yoyopod remote config edit
# Default board validation flow:
#   git branch --show-current
#   git rev-parse HEAD
#   yoyopod remote validate --branch <branch>
# Dirty-tree `yoyopod remote sync` is a rare debugging escape hatch only.

host: ""
user: ""
project_dir: ~/yoyopod-core
branch: main
venv: .venv
start_cmd: python yoyopod.py
kill_processes:
  - python
  - linphonec
log_file: logs/yoyopod.log
error_log_file: logs/yoyopod_errors.log
pid_file: /tmp/yoyopod.pid
startup_marker: "YoYoPod starting"
screenshot_path: /tmp/yoyopod_screenshot.png
# Validation-only library used automatically by `yoyopod pi validate smoke --with-music` unless disabled.
test_music_target_dir: ~/YoYoPod_Test_Music
rsync_exclude:
  - .git/
  - .cache/
  - __pycache__/
  - "*.pyc"
  - .venv/
  - build/
  - logs/
  - models/
  - node_modules/
  - "*.egg-info/"

# Slot-deploy layout on the Pi. Override fields in pi-deploy.local.yaml.
slot:
  root: /opt/yoyopod
  releases_subdir: releases
  state_subdir: state
  bin_subdir: bin
  current_link: current
  previous_link: previous
