# Raspberry Pi deploy contract for YoyoPod.
# This is the shared source of truth for scripts/pi_remote.py and Pi skills.
# Machine-specific connection overrides belong in deploy/pi-deploy.local.yaml.
# Leave host/user blank in the tracked file; do not commit personal Pi values here.
# Create or edit that file with:
#   uv run python scripts/pi_remote.py config edit

host: ""
user: ""
project_dir: ~/YoyoPod_Core
branch: main
venv: .venv
start_cmd: python yoyopod.py
kill_processes:
  - python
  - linphonec
log_file: logs/yoyopod.log
error_log_file: logs/yoyopod_errors.log
pid_file: /tmp/yoyopod.pid
startup_marker: "YoyoPod starting"
screenshot_path: /tmp/yoyopod_screenshot.png
rsync_exclude:
  - .git/
  - .cache/
  - __pycache__/
  - "*.pyc"
  - .venv/
  - build/
  - logs/
  - models/
  - node_modules/
  - "*.egg-info/"
