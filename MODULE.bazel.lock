erde_yaml-0.9.34-deprecated//:serde_yaml\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"sha2-0.10.9\",\n    actual = \"@crates__sha2-0.10.9//:sha2\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"sha2\",\n    actual = \"@crates__sha2-0.10.9//:sha2\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"thiserror-2.0.18\",\n    actual = \"@crates__thiserror-2.0.18//:thiserror\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"thiserror\",\n    actual = \"@crates__thiserror-2.0.18//:thiserror\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"time-0.3.47\",\n    actual = \"@crates__time-0.3.47//:time\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"time\",\n    actual = \"@crates__time-0.3.47//:time\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"ureq-2.12.1\",\n    actual = \"@crates__ureq-2.12.1//:ureq\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"ureq\",\n    actual = \"@crates__ureq-2.12.1//:ureq\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"yoyopod-ui-0.1.0\",\n    actual = \"@crates__yoyopod-ui-0.1.0//:yoyopod_ui\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"yoyopod-ui\",\n    actual = \"@crates__yoyopod-ui-0.1.0//:yoyopod_ui\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"yoyopod-voip-0.1.0\",\n    actual = \"@crates__yoyopod-voip-0.1.0//:yoyopod_voip\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"yoyopod-voip\",\n    actual = \"@crates__yoyopod-voip-0.1.0//:yoyopod_voip\",\n    tags = [\"manual\"],\n)\n",
                "alias_rules.bzl": "\"\"\"Alias that transitions its target to `compilation_mode=opt`.  Use `transition_alias=\"opt\"` to enable.\"\"\"\r\n\r\nload(\"@rules_cc//cc:defs.bzl\", \"CcInfo\")\r\nload(\"@rules_rust//rust:rust_common.bzl\", \"COMMON_PROVIDERS\")\r\n\r\ndef _transition_alias_impl(ctx):\r\n    # `ctx.attr.actual` is a list of 1 item due to the transition\r\n    providers = [ctx.attr.actual[0][provider] for provider in COMMON_PROVIDERS]\r\n    if CcInfo in ctx.attr.actual[0]:\r\n        providers.append(ctx.attr.actual[0][CcInfo])\r\n    return providers\r\n\r\ndef _change_compilation_mode(compilation_mode):\r\n    def _change_compilation_mode_impl(_settings, _attr):\r\n        return {\r\n            \"//command_line_option:compilation_mode\": compilation_mode,\r\n        }\r\n\r\n    return transition(\r\n        implementation = _change_compilation_mode_impl,\r\n        inputs = [],\r\n        outputs = [\r\n            \"//command_line_option:compilation_mode\",\r\n        ],\r\n    )\r\n\r\ndef _transition_alias_rule(compilation_mode):\r\n    return rule(\r\n        implementation = _transition_alias_impl,\r\n        provides = COMMON_PROVIDERS,\r\n        attrs = {\r\n            \"actual\": attr.label(\r\n                mandatory = True,\r\n                doc = \"`rust_library()` target to transition to `compilation_mode=opt`.\",\r\n                providers = COMMON_PROVIDERS,\r\n                cfg = _change_compilation_mode(compilation_mode),\r\n            ),\r\n            \"_allowlist_function_transition\": attr.label(\r\n                default = \"@bazel_tools//tools/allowlists/function_transition_allowlist\",\r\n            ),\r\n        },\r\n        doc = \"Transitions a Rust library crate to the `compilation_mode=opt`.\",\r\n    )\r\n\r\ntransition_alias_dbg = _transition_alias_rule(\"dbg\")\r\ntransition_alias_fastbuild = _transition_alias_rule(\"fastbuild\")\r\ntransition_alias_opt = _transition_alias_rule(\"opt\")\r\n",
                "defs.bzl": "###############################################################################\r\n# @generated\r\n# DO NOT MODIFY: This file is auto-generated by a crate_universe tool. To \r\n# regenerate this file, run the following:\r\n#\r\n#     bazel mod show_repo 'yoyopod'\r\n###############################################################################\r\n\"\"\"\r\n# `crates_repository` API\r\n\r\n- [aliases](#aliases)\r\n- [crate_deps](#crate_deps)\r\n- [all_crate_deps](#all_crate_deps)\r\n- [crate_repositories](#crate_repositories)\r\n\r\n\"\"\"\r\n\r\nload(\"@bazel_tools//tools/build_defs/repo:git.bzl\", \"git_repository\")\r\nload(\"@bazel_tools//tools/build_defs/repo:http.bzl\", \"http_archive\")\r\nload(\"@bazel_tools//tools/build_defs/repo:utils.bzl\", \"maybe\")\r\nload(\"@bazel_skylib//lib:selects.bzl\", \"selects\")\r\nload(\"@rules_rust//crate_universe/private:local_crate_mirror.bzl\", \"local_crate_mirror\")\r\n\r\n###############################################################################\r\n# MACROS API\r\n###############################################################################\r\n\r\n# An identifier that represent common dependencies (unconditional).\r\n_COMMON_CONDITION = \"\"\r\n\r\ndef _flatten_dependency_maps(all_dependency_maps):\r\n    \"\"\"Flatten a list of dependency maps into one dictionary.\r\n\r\n    Dependency maps have the following structure:\r\n\r\n    ```python\r\n    DEPENDENCIES_MAP = {\r\n        # The first key in the map is a Bazel package\r\n        # name of the workspace this file is defined in.\r\n        \"workspace_member_package\": {\r\n\r\n            # Not all dependencies are supported for all platforms.\r\n            # the condition key is the condition required to be true\r\n            # on the host platform.\r\n            \"condition\": {\r\n\r\n                # An alias to a crate target.     # The label of the crate target the\r\n                # Aliases are only crate names.   # package name refers to.\r\n                \"package_name\":                   \"@full//:label\",\r\n            }\r\n        }\r\n    }\r\n    ```\r\n\r\n    Args:\r\n        all_dependency_maps (list): A list of dicts as described above\r\n\r\n    Returns:\r\n        dict: A dictionary as described above\r\n    \"\"\"\r\n    dependencies = {}\r\n\r\n    for workspace_deps_map in all_dependency_maps:\r\n        for pkg_name, conditional_deps_map in workspace_deps_map.items():\r\n            if pkg_name not in dependencies:\r\n                non_frozen_map = dict()\r\n                for key, values in conditional_deps_map.items():\r\n                    non_frozen_map.update({key: dict(values.items())})\r\n                dependencies.setdefault(pkg_name, non_frozen_map)\r\n                continue\r\n\r\n            for condition, deps_map in conditional_deps_map.items():\r\n                # If the condition has not been recorded, do so and continue\r\n                if condition not in dependencies[pkg_name]:\r\n                    dependencies[pkg_name].setdefault(condition, dict(deps_map.items()))\r\n                    continue\r\n\r\n                # Alert on any miss-matched dependencies\r\n                inconsistent_entries = []\r\n                for crate_name, crate_label in deps_map.items():\r\n                    existing = dependencies[pkg_name][condition].get(crate_name)\r\n                    if existing and existing != crate_label:\r\n                        inconsistent_entries.append((crate_name, existing, crate_label))\r\n                    dependencies[pkg_name][condition].update({crate_name: crate_label})\r\n\r\n    return dependencies\r\n\r\ndef crate_deps(deps, package_name = None):\r\n    \"\"\"Finds the fully qualified label of the requested crates for the package where this macro is called.\r\n\r\n    Args:\r\n        deps (list): The desired list of crate targets.\r\n        package_name (str, optional): The package name of the set of dependencies to look up.\r\n            Defaults to `native.package_name()`.\r\n\r\n    Returns:\r\n        list: A list of labels to generated rust targets (str)\r\n    \"\"\"\r\n\r\n    if not deps:\r\n        return []\r\n\r\n    if package_name == None:\r\n        package_name = native.package_name()\r\n\r\n    # Join both sets of dependencies\r\n    dependencies = _flatten_dependency_maps([\r\n        _NORMAL_DEPENDENCIES,\r\n        _NORMAL_DEV_DEPENDENCIES,\r\n        _PROC_MACRO_DEPENDENCIES,\r\n        _PROC_MACRO_DEV_DEPENDENCIES,\r\n        _BUILD_DEPENDENCIES,\r\n        _BUILD_PROC_MACRO_DEPENDENCIES,\r\n    ]).pop(package_name, {})\r\n\r\n    # Combine all conditional packages so we can easily index over a flat list\r\n    # TODO: Perhaps this should actually return select statements and maintain\r\n    # the conditionals of the dependencies\r\n    flat_deps = {}\r\n    for deps_set in dependencies.values():\r\n        for crate_name, crate_label in deps_set.items():\r\n            flat_deps.update({crate_name: crate_label})\r\n\r\n    missing_crates = []\r\n    crate_targets = []\r\n    for crate_target in deps:\r\n        if crate_target not in flat_deps:\r\n            missing_crates.append(crate_target)\r\n        else:\r\n            crate_targets.append(flat_deps[crate_target])\r\n\r\n    if missing_crates:\r\n        fail(\"Could not find crates `{}` among dependencies of `{}`. Available dependencies were `{}`\".format(\r\n            missing_crates,\r\n            package_name,\r\n            dependencies,\r\n        ))\r\n\r\n    return crate_targets\r\n\r\ndef all_crate_deps(\r\n        normal = False, \r\n        normal_dev = False, \r\n        proc_macro = False, \r\n        proc_macro_dev = False,\r\n        build = False,\r\n        build_proc_macro = False,\r\n        package_name = None):\r\n    \"\"\"Finds the fully qualified label of all requested direct crate dependencies \\\r\n    for the package where this macro is called.\r\n\r\n    If no parameters are set, all normal dependencies are returned. Setting any one flag will\r\n    otherwise impact the contents of the returned list.\r\n\r\n    Args:\r\n        normal (bool, optional): If True, normal dependencies are included in the\r\n            output list.\r\n        normal_dev (bool, optional): If True, normal dev dependencies will be\r\n            included in the output list.\r\n        proc_macro (bool, optional): If True, proc_macro dependencies are included\r\n            in the output list.\r\n        proc_macro_dev (bool, optional): If True, dev proc_macro dependencies are\r\n            included in the output list.\r\n        build (bool, optional): If True, build dependencies are included\r\n            in the output list.\r\n        build_proc_macro (bool, optional): If True, build proc_macro dependencies are\r\n            included in the output list.\r\n        package_name (str, optional): The package name of the set of dependencies to look up.\r\n            Defaults to `native.package_name()` when unset.\r\n\r\n    Returns:\r\n        list: A list of labels to generated rust targets (str)\r\n    \"\"\"\r\n\r\n    if package_name == None:\r\n        package_name = native.package_name()\r\n\r\n    # Determine the relevant maps to use\r\n    all_dependency_maps = []\r\n    if normal:\r\n        all_dependency_maps.append(_NORMAL_DEPENDENCIES)\r\n    if normal_dev:\r\n        all_dependency_maps.append(_NORMAL_DEV_DEPENDENCIES)\r\n    if proc_macro:\r\n        all_dependency_maps.append(_PROC_MACRO_DEPENDENCIES)\r\n    if proc_macro_dev:\r\n        all_dependency_maps.append(_PROC_MACRO_DEV_DEPENDENCIES)\r\n    if build:\r\n        all_dependency_maps.append(_BUILD_DEPENDENCIES)\r\n    if build_proc_macro:\r\n        all_dependency_maps.append(_BUILD_PROC_MACRO_DEPENDENCIES)\r\n\r\n    # Default to always using normal dependencies\r\n    if not all_dependency_maps:\r\n        all_dependency_maps.append(_NORMAL_DEPENDENCIES)\r\n\r\n    dependencies = _flatten_dependency_maps(all_dependency_maps).pop(package_name, None)\r\n\r\n    if not dependencies:\r\n        if dependencies == None:\r\n            fail(\"Tried to get all_crate_deps for package \" + package_name + \" but that package had no Cargo.toml file\")\r\n        else:\r\n            return []\r\n\r\n    crate_deps = list(dependencies.pop(_COMMON_CONDITION, {}).values())\r\n    for condition, deps in dependencies.items():\r\n        crate_deps += selects.with_or({\r\n            tuple(_CONDITIONS[condition]): deps.values(),\r\n            \"//conditions:default\": [],\r\n        })\r\n\r\n    return crate_deps\r\n\r\ndef aliases(\r\n        normal = False,\r\n        normal_dev = False,\r\n        proc_macro = False,\r\n        proc_macro_dev = False,\r\n        build = False,\r\n        build_proc_macro = False,\r\n        package_name = None):\r\n    \"\"\"Produces a map of Crate alias names to their original label\r\n\r\n    If no dependency kinds are specified, `normal` and `proc_macro` are used by default.\r\n    Setting any one flag will otherwise determine the contents of the returned dict.\r\n\r\n    Args:\r\n        normal (bool, optional): If True, normal dependencies are included in the\r\n            output list.\r\n        normal_dev (bool, optional): If True, normal dev dependencies will be\r\n            included in the output list..\r\n        proc_macro (bool, optional): If True, proc_macro dependencies are included\r\n            in the output list.\r\n        proc_macro_dev (bool, optional): If True, dev proc_macro dependencies are\r\n            included in the output list.\r\n        build (bool, optional): If True, build dependencies are included\r\n            in the output list.\r\n        build_proc_macro (bool, optional): If True, build proc_macro dependencies are\r\n            included in the output list.\r\n        package_name (str, optional): The package name of the set of dependencies to look up.\r\n            Defaults to `native.package_name()` when unset.\r\n\r\n    Returns:\r\n        dict: The aliases of all associated packages\r\n    \"\"\"\r\n    if package_name == None:\r\n        package_name = native.package_name()\r\n\r\n    # Determine the relevant maps to use\r\n    all_aliases_maps = []\r\n    if normal:\r\n        all_aliases_maps.append(_NORMAL_ALIASES)\r\n    if normal_dev:\r\n        all_aliases_maps.append(_NORMAL_DEV_ALIASES)\r\n    if proc_macro:\r\n        all_aliases_maps.append(_PROC_MACRO_ALIASES)\r\n    if proc_macro_dev:\r\n        all_aliases_maps.append(_PROC_MACRO_DEV_ALIASES)\r\n    if build:\r\n        all_aliases_maps.append(_BUILD_ALIASES)\r\n    if build_proc_macro:\r\n        all_aliases_maps.append(_BUILD_PROC_MACRO_ALIASES)\r\n\r\n    # Default to always using normal aliases\r\n    if not all_aliases_maps:\r\n        all_aliases_maps.append(_NORMAL_ALIASES)\r\n        all_aliases_maps.append(_PROC_MACRO_ALIASES)\r\n\r\n    aliases = _flatten_dependency_maps(all_aliases_maps).pop(package_name, None)\r\n\r\n    if not aliases:\r\n        return dict()\r\n\r\n    common_items = aliases.pop(_COMMON_CONDITION, {}).items()\r\n\r\n    # If there are only common items in the dictionary, immediately return them\r\n    if not len(aliases.keys()) == 1:\r\n        return dict(common_items)\r\n\r\n    # Build a single select statement where each conditional has accounted for the\r\n    # common set of aliases.\r\n    crate_aliases = {\"//conditions:default\": dict(common_items)}\r\n    for condition, deps in aliases.items():\r\n        condition_triples = _CONDITIONS[condition]\r\n        for triple in condition_triples:\r\n            if triple in crate_aliases:\r\n                crate_aliases[triple].update(deps)\r\n            else:\r\n                crate_aliases.update({triple: dict(deps.items() + common_items)})\r\n\r\n    return select(crate_aliases)\r\n\r\n###############################################################################\r\n# WORKSPACE MEMBER DEPS AND ALIASES\r\n###############################################################################\r\n\r\n_NORMAL_DEPENDENCIES = {\r\n    \"device/media\": {\r\n        _COMMON_CONDITION: {\r\n            \"anyhow\": Label(\"@crates//:anyhow-1.0.102\"),\r\n            \"clap\": Label(\"@crates//:clap-4.6.1\"),\r\n            \"filetime\": Label(\"@crates//:filetime-0.2.27\"),\r\n            \"rand\": Label(\"@crates//:rand-0.8.6\"),\r\n            \"serde\": Label(\"@crates//:serde-1.0.228\"),\r\n            \"serde_json\": Label(\"@crates//:serde_json-1.0.149\"),\r\n            \"sha2\": Label(\"@crates//:sha2-0.10.9\"),\r\n            \"thiserror\": Label(\"@crates//:thiserror-2.0.18\"),\r\n            \"time\": Label(\"@crates//:time-0.3.47\"),\r\n            \"ureq\": Label(\"@crates//:ureq-2.12.1\"),\r\n        },\r\n    },\r\n    \"device/runtime\": {\r\n        _COMMON_CONDITION: {\r\n            \"anyhow\": Label(\"@crates//:anyhow-1.0.102\"),\r\n            \"clap\": Label(\"@crates//:clap-4.6.1\"),\r\n            \"ctrlc\": Label(\"@crates//:ctrlc-3.5.2\"),\r\n            \"serde\": Label(\"@crates//:serde-1.0.228\"),\r\n            \"serde_json\": Label(\"@crates//:serde_json-1.0.149\"),\r\n            \"serde_yaml\": Label(\"@crates//:serde_yaml-0.9.34+deprecated\"),\r\n            \"thiserror\": Label(\"@crates//:thiserror-2.0.18\"),\r\n            \"time\": Label(\"@crates//:time-0.3.47\"),\r\n        },\r\n    },\r\n    \"device/ui\": {\r\n        _COMMON_CONDITION: {\r\n            \"anyhow\": Label(\"@crates//:anyhow-1.0.102\"),\r\n            \"clap\": Label(\"@crates//:clap-4.6.1\"),\r\n            \"embedded-graphics\": Label(\"@crates//:embedded-graphics-0.8.2\"),\r\n            \"libloading\": Label(\"@crates//:libloading-0.8.9\"),\r\n            \"serde\": Label(\"@crates//:serde-1.0.228\"),\r\n            \"serde_json\": Label(\"@crates//:serde_json-1.0.149\"),\r\n            \"thiserror\": Label(\"@crate