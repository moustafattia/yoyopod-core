<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">YoYoPod dev and prod deployment lanes</title>
  <desc id="desc">Infographic showing the YoYoPod dev lane, prod lane, bootstrap commands, lane switching commands, and deploy commands.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6F1E7"/>
      <stop offset="48%" stop-color="#EBF6F0"/>
      <stop offset="100%" stop-color="#E8F0F7"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E7C66"/>
      <stop offset="100%" stop-color="#19B58A"/>
    </linearGradient>
    <linearGradient id="prodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183A5A"/>
      <stop offset="100%" stop-color="#2A6F97"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3B642"/>
      <stop offset="100%" stop-color="#E46F2E"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#203040" flood-opacity="0.16"/>
    </filter>
    <filter id="tightShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#203040" flood-opacity="0.18"/>
    </filter>
    <pattern id="grain" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="7" r="1.2" fill="#28445A" opacity="0.06"/>
      <circle cx="28" cy="19" r="1" fill="#0E7C66" opacity="0.06"/>
      <circle cx="16" cy="31" r="0.9" fill="#E46F2E" opacity="0.05"/>
    </pattern>
    <style>
      .title { font-family: "Aptos Display", "Segoe UI", sans-serif; font-size: 58px; font-weight: 800; fill: #14202B; letter-spacing: -1.4px; }
      .subtitle { font-family: "Segoe UI", sans-serif; font-size: 23px; fill: #536170; }
      .section-title { font-family: "Aptos Display", "Segoe UI", sans-serif; font-size: 34px; font-weight: 800; fill: #FFFFFF; letter-spacing: -0.4px; }
      .section-kicker { font-family: "Segoe UI", sans-serif; font-size: 17px; font-weight: 700; fill: rgba(255,255,255,0.78); text-transform: uppercase; letter-spacing: 2.4px; }
      .card-title { font-family: "Aptos Display", "Segoe UI", sans-serif; font-size: 28px; font-weight: 800; fill: #162433; }
      .card-subtitle { font-family: "Segoe UI", sans-serif; font-size: 18px; fill: #52616F; }
      .body { font-family: "Segoe UI", sans-serif; font-size: 19px; fill: #243341; }
      .small { font-family: "Segoe UI", sans-serif; font-size: 16px; fill: #5B6976; }
      .label { font-family: "Segoe UI", sans-serif; font-size: 15px; font-weight: 800; fill: #FFFFFF; text-transform: uppercase; letter-spacing: 1.8px; }
      .mono { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 15px; fill: #D7F7EA; }
      .mono-dark { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 15px; fill: #CFE5F7; }
      .mono-boot { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 14px; fill: #233241; }
      .mono-light { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 14px; fill: #EAF1F6; }
      .note { font-family: "Segoe UI", sans-serif; font-size: 16px; fill: #6B4B18; }
      .small-light { font-family: "Segoe UI", sans-serif; font-size: 16px; fill: #EAF1F6; }
      .pill-text { font-family: "Segoe UI", sans-serif; font-size: 16px; font-weight: 800; fill: #172331; }
      .path { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 18px; font-weight: 700; fill: #FFFFFF; }
      .muted-line { stroke: #D1DBE2; stroke-width: 2; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#page)"/>
  <rect width="1600" height="1120" fill="url(#grain)" opacity="0.8"/>
  <path d="M-80 250 C220 80 410 150 640 230 C930 332 1110 250 1680 60 L1680 -60 L-80 -60 Z" fill="#FFFFFF" opacity="0.38"/>
  <path d="M-60 980 C260 850 480 965 710 900 C1020 810 1250 895 1660 760 L1660 1180 L-60 1180 Z" fill="#FFFFFF" opacity="0.42"/>

  <text x="80" y="96" class="title">YoYoPod Dev | Prod Lanes</text>
  <text x="82" y="135" class="subtitle">Two intentional runtime lanes: mutable dev checkout for PRs; immutable prod slots for releases.</text>

  <g transform="translate(1115 62)" filter="url(#tightShadow)">
    <rect x="0" y="0" width="405" height="92" rx="28" fill="#152535"/>
    <circle cx="52" cy="46" r="22" fill="url(#goldGrad)"/>
    <text x="92" y="37" class="label">Golden rule</text>
    <text x="92" y="66" class="mono-light">Run mode status before switching lanes</text>
  </g>

  <g transform="translate(80 182)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1440" height="210" rx="34" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1440" height="12" rx="6" fill="url(#goldGrad)"/>
    <text x="38" y="54" class="card-title">Fresh board bootstrap</text>
    <text x="38" y="84" class="card-subtitle">Run on the Pi. It creates /opt/yoyopod-dev, /opt/yoyopod-prod, systemd units, and the hard-cut lane ownership model.</text>
    <g transform="translate(38 108)">
      <rect x="0" y="0" width="1364" height="64" rx="16" fill="#F6F0DF" stroke="#E6D09A"/>
      <text x="18" y="24" class="mono-boot">curl -fsSL https://raw.githubusercontent.com/moustafattia/yoyopod-core/main/deploy/scripts/install_pi.sh</text>
      <text x="18" y="48" class="mono-boot">  | sudo -E bash -s --</text>
    </g>
    <g transform="translate(38 188)">
      <rect x="0" y="-20" width="660" height="34" rx="17" fill="#FFF5D7"/>
      <text x="18" y="3" class="note">First prod install: append -- --release-url=&lt;artifact-url&gt;</text>
      <rect x="710" y="-20" width="654" height="34" rx="17" fill="#EAF6F2"/>
      <text x="730" y="3" class="small">Dev checkout is explicit: clone into /opt/yoyopod-dev/checkout, then run remote setup once.</text>
    </g>
  </g>

  <g transform="translate(80 434)" filter="url(#softShadow)">
    <rect x="0" y="0" width="660" height="548" rx="38" fill="#FFFFFF"/>
    <rect x="0" y="0" width="660" height="128" rx="38" fill="url(#devGrad)"/>
    <text x="42" y="48" class="section-kicker">Mutable lane</text>
    <text x="42" y="90" class="section-title">DEV: PR hardware loop</text>
    <g transform="translate(490 31)">
      <rect x="0" y="0" width="116" height="50" rx="25" fill="#FFFFFF" opacity="0.18"/>
      <text x="18" y="32" class="path">/opt</text>
    </g>

    <g transform="translate(42 158)">
      <text x="0" y="0" class="card-title">What it owns</text>
      <text x="0" y="34" class="body">Path: /opt/yoyopod-dev/checkout</text>
      <text x="0" y="64" class="body">Runtime: /opt/yoyopod-dev/venv</text>
      <text x="0" y="94" class="body">Service: yoyopod-dev.service</text>
      <text x="0" y="124" class="body">Native libs: rebuilt on target as needed</text>
    </g>

    <g transform="translate(42 318)">
      <rect x="0" y="0" width="576" height="178" rx="24" fill="#102C28"/>
      <text x="24" y="34" class="label">Deploy commands from dev machine</text>
      <text x="24" y="68" class="mono">uv run yoyopod remote --host &lt;pi&gt; mode activate dev</text>
      <text x="24" y="96" class="mono">uv run yoyopod remote --host &lt;pi&gt; setup      # once</text>
      <text x="24" y="124" class="mono">uv run yoyopod deploy --host &lt;pi&gt; --branch &lt;branch&gt;</text>
      <text x="24" y="152" class="mono">add --clean-native after native/CMake branch switches</text>
    </g>

    <g transform="translate(42 514)">
      <rect x="0" y="0" width="576" height="46" rx="17" fill="#EAF6F2"/>
      <text x="18" y="19" class="small">Validate PR: remote --host &lt;pi&gt; --branch &lt;branch&gt; validate</text>
      <text x="18" y="38" class="small">with --sha &lt;commit&gt; plus optional --with-music / --with-voip</text>
    </g>
  </g>

  <g transform="translate(860 434)" filter="url(#softShadow)">
    <rect x="0" y="0" width="660" height="548" rx="38" fill="#FFFFFF"/>
    <rect x="0" y="0" width="660" height="128" rx="38" fill="url(#prodGrad)"/>
    <text x="42" y="48" class="section-kicker">Immutable lane</text>
    <text x="42" y="90" class="section-title">PROD: OTA release slots</text>
    <g transform="translate(462 31)">
      <rect x="0" y="0" width="144" height="50" rx="25" fill="#FFFFFF" opacity="0.18"/>
      <text x="18" y="32" class="path">current</text>
    </g>

    <g transform="translate(42 158)">
      <text x="0" y="0" class="card-title">What it owns</text>
      <text x="0" y="34" class="body">Path: /opt/yoyopod-prod/releases/&lt;version&gt;</text>
      <text x="0" y="64" class="body">Pointers: current and previous symlinks</text>
      <text x="0" y="94" class="body">Service: yoyopod-prod.service</text>
      <text x="0" y="124" class="body">Runtime: bundled inside each slot artifact</text>
    </g>

    <g transform="translate(42 318)">
      <rect x="0" y="0" width="576" height="178" rx="24" fill="#132D44"/>
      <text x="24" y="34" class="label">Deploy commands from dev machine</text>
      <text x="24" y="68" class="mono-dark">uv run yoyopod remote --host &lt;pi&gt; mode activate prod</text>
      <text x="24" y="96" class="mono-dark">uv run yoyopod remote --host &lt;pi&gt; release install-url</text>
      <text x="24" y="124" class="mono-dark">  --first-deploy &lt;artifact-url&gt;</text>
      <text x="24" y="152" class="mono-dark">uv run yoyopod remote --host &lt;pi&gt; release push &lt;slot.tar.gz&gt;</text>
    </g>

    <g transform="translate(42 514)">
      <rect x="0" y="0" width="576" height="46" rx="17" fill="#EAF1F8"/>
      <text x="18" y="19" class="small">Inspect prod: remote --host &lt;pi&gt; release status.</text>
      <text x="18" y="38" class="small">Rollback: remote --host &lt;pi&gt; release rollback.</text>
    </g>
  </g>

  <g transform="translate(740 510)">
    <line x1="20" y1="0" x2="20" y2="360" stroke="#9EADB8" stroke-width="3" class="dash"/>
    <circle cx="20" cy="170" r="62" fill="#FFFFFF" filter="url(#tightShadow)"/>
    <circle cx="20" cy="170" r="46" fill="#172331"/>
    <text x="20" y="151" text-anchor="middle" class="label">one</text>
    <text x="20" y="176" text-anchor="middle" class="label">owner</text>
    <text x="20" y="201" text-anchor="middle" class="label">only</text>
  </g>

  <text x="80" y="1046" class="small">Source of truth: docs/DEV_PROD_LANES.md, docs/SLOT_DEPLOY.md, deploy/scripts/install_pi.sh, and yoyopod remote --help.</text>
</svg>
